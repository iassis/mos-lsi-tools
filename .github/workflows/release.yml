name: Build and Package MOS Plugin

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Build Native Debian Package Layout
        run: |
          # 1. Establish structural paths inside the package
          # Creating both root-level staging and internal system paths to ensure compatibility
          mkdir -p debian-build/opt/mos/plugins/mos-lsi-tools
          mkdir -p debian-build/DEBIAN

          # 2. Copy payload to system installation path
          cp -r functions settings.json plugin.config.js README.md debian-build/opt/mos/plugins/mos-lsi-tools/

          # 3. ALSO place the files flatly at the package root level in case the unpacker reads 'source' directly
          cp settings.json plugin.config.js README.md debian-build/
          cp -r functions debian-build/

          # 4. Generate required Debian metadata control manifest
          cat <<EOF > debian-build/DEBIAN/control
          Package: mos-lsi-tools
          Version: 1.0.3
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: iassis
          Description: Headless plugin that installs Broadcom/LSI command-line utilities (storcli64, sas3flash, megacli) for HBA management.
          EOF

          # 5. Compile the native package binary target
          dpkg-deb --build debian-build mos-lsi-tools_1.0.3_amd64.deb

      - name: Upload Deb Asset to Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: mos-lsi-tools_1.0.3_amd64.deb
          tag_name: ${{ github.event.release.tag_name || '1.0.3' }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
