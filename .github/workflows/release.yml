name: Build and Release MOS LSI Tools

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.3)'
        required: true
        default: '1.0.3'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vue plugin page
        working-directory: page
        run: |
          npm install
          npm run build

      - name: Create package structure
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-lsi-tools-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"

          # 1. Create native OS directory paths
          mkdir -p ${PKG_DIR}/usr/bin/plugins
          mkdir -p ${PKG_DIR}/var/www/mos-plugins/mos-lsi-tools
          mkdir -p ${PKG_DIR}/DEBIAN

          # 2. Copy your backend LSI scripts into the native execution path
          cp -R functions/* ${PKG_DIR}/usr/bin/plugins/ 2>/dev/null || cp -R functions ${PKG_DIR}/usr/bin/plugins/
          chmod +x ${PKG_DIR}/usr/bin/plugins/* || true

          # 3. Copy Vite's compiled assets
          cp -R page/dist/mos-lsi-tools/* ${PKG_DIR}/var/www/mos-plugins/mos-lsi-tools/

          # 4. EXPLICITLY copy configuration anchors from the page folder source
          cp page/plugin.config.js ${PKG_DIR}/var/www/mos-plugins/mos-lsi-tools/
          cp settings.json ${PKG_DIR}/var/www/mos-plugins/mos-lsi-tools/ || true

          # 5. Create standard DEBIAN control file metadata
          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: mos-lsi-tools-plugin
          Version: ${VERSION}-1+mos-plugin
          Architecture: amd64
          Maintainer: iassis
          Description: Broadcom/LSI HBA Command-Line Management Utilities for MOS
          EOF

          # 6. Create postinst permissions script
          cat > ${PKG_DIR}/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          chmod -R +x /usr/bin/plugins/
          exit 0
          EOF
          chmod +x ${PKG_DIR}/DEBIAN/postinst

      - name: Build native .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-lsi-tools-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"
          DEB_FILE="${PKG_NAME}_amd64.deb"

          dpkg-deb --build ${PKG_DIR}
          md5sum ${DEB_FILE} | awk '{print $1}' > ${DEB_FILE}.md5

      - name: Upload Native DEB to Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: LSI Tools ${{ steps.version.outputs.VERSION }}
          files: |
            mos-lsi-tools-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb
            mos-lsi-tools-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb.md5
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
