name: Build and Release MOS LSI Tools

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.3)'
        required: true
        default: '1.0.3'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vue plugin page
        working-directory: page
        run: |
          npm install
          npm run build

      - name: Create package structure
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_DIR="mos-lsi-tools_amd64"

          # 1. Create native OS directory paths
          mkdir -p ${PKG_DIR}/opt/mos-lsi-tools
          mkdir -p ${PKG_DIR}/var/www/mos-plugins/mos-lsi-tools
          mkdir -p ${PKG_DIR}/DEBIAN

          # 2. Copy your backend LSI scripts and configuration
          cp -R functions ${PKG_DIR}/opt/mos-lsi-tools/
          cp settings.json ${PKG_DIR}/opt/mos-lsi-tools/ || true

          # 3. Copy the compiled Vue frontend into the web directory path
          cp -R page/dist/*/* ${PKG_DIR}/var/www/mos-plugins/mos-lsi-tools/ 2>/dev/null || cp -R page/dist/* ${PKG_DIR}/var/www/mos-plugins/mos-lsi-tools/

          # 4. Create DEBIAN metadata
          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: mos-lsi-tools
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: iassis
          Description: Headless plugin that installs Broadcom/LSI command-line utilities for HBA management.
          EOF

          # 5. Ensure internal scripts stay executable
          cat > ${PKG_DIR}/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          chmod -R +x /opt/mos-lsi-tools/functions/
          exit 0
          EOF
          chmod +x ${PKG_DIR}/DEBIAN/postinst

      - name: Build native .deb package
        run: |
          PKG_DIR="mos-lsi-tools_amd64"
          DEB_FILE="mos-lsi-tools_${{ steps.version.outputs.VERSION }}_amd64.deb"
          dpkg-deb --build ${PKG_DIR} ${DEB_FILE}

      # --- NEW: Zip the entire workspace to satisfy the extraction framework ---
      - name: Create Final MOS Hub Zip Wrapper
        run: |
          # Keep configurations and the deb package at the root of the archive folder
          zip -r mos-lsi-tools.zip settings.json page README.md mos-lsi-tools_${{ steps.version.outputs.VERSION }}_amd64.deb

      - name: Upload Distribution Zip to Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: mos-lsi-tools.zip
          tag_name: ${{ steps.version.outputs.VERSION }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
