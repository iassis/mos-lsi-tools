name: Build and Package MOS Plugin

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Create Architecture Validation DEB
        run: |
          mkdir -p dummy-deb/DEBIAN
          cat <<EOF > dummy-deb/DEBIAN/control
          Package: mos-lsi-tools
          Version: 1.0.3
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: iassis
          Description: Architecture validation anchor for MOS Hub
          EOF
          dpkg-deb --build dummy-deb mos-lsi-tools_1.0.3_amd64.deb

      - name: Create MOS Hub Zip Package
        run: |
          zip -r mos-lsi-tools.zip functions settings.json plugin.config.js README.md mos-lsi-tools_1.0.3_amd64.deb

      - name: Upload Zip Asset to Github Release
        uses: softprops/action-gh-release@v2
        with:
          files: mos-lsi-tools.zip
          tag_name: ${{ github.event.release.tag_name || '1.0.3' }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
